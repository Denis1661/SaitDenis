<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Snake | Future Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff00ff;
            --bg-dark: #0a0a0c;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px var(--primary);
            background: rgba(0, 0, 0, 0.8);
        }

        canvas {
            display: block;
        }

        .ui {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--primary);
            margin: 0;
        }

        .score {
            font-size: 24px;
            color: var(--secondary);
        }

        .controls {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        /* Екран програшу */
        #overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="ui">
        <h1>CYBER-SNAKE</h1>
        <div class="score">SCORE: <span id="scoreVal">0</span></div>
    </div>

    <div class="game-container">
        <div id="overlay">
            <h2>SYSTEM FAILURE</h2>
            <button class="btn" onclick="resetGame()">REBOOT</button>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div class="controls">ВИКОРИСТОВУЙТЕ СТРІЛКИ ДЛЯ КЕРУВАННЯ</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");
        const overlay = document.getElementById("overlay");

        const box = 20;
        let score = 0;
        let gameSpeed = 100;
        
        let snake = [{ x: 9 * box, y: 10 * box }];
        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };
        
        let d;

        document.addEventListener("keydown", direction);

        function direction(event) {
            if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d != "DOWN") d = "UP";
            else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            ctx.fillStyle = "#0a0a0c";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Малюємо змійку
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00f2ff" : "#008a91";
                ctx.strokeStyle = "#0a0a0c";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // Малюємо їжу (чіп)
            ctx.fillStyle = "#ff00ff";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff00ff";
            ctx.fillRect(food.x, food.y, box, box);
            ctx.shadowBlur = 0;

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            // Перевірка чи з'їла їжу
            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // Game Over умови
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                overlay.style.display = "flex";
            }

            snake.unshift(newHead);
        }

        function resetGame() {
            snake = [{ x: 9 * box, y: 10 * box }];
            score = 0;
            scoreElement.innerHTML = score;
            d = undefined;
            overlay.style.display = "none";
            game = setInterval(draw, gameSpeed);
        }

        let game = setInterval(draw, gameSpeed);
    </script>
</body>
</html>
